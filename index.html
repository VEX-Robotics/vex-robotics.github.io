<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Robot Team Interview Tracker</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #18202f;
      --muted: #667085;
      --border: #d0d5dd;
      --primary: #0b67ff;
      --danger: #c81e1e;
      --ok: #057a55;
      --shadow: 0 8px 30px rgba(16, 24, 40, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(246,247,251,.94);
      backdrop-filter: blur(10px);
      padding: 14px 0 10px;
    }
    h1 { margin: 0; font-size: 1.35rem; }
    .sub { color: var(--muted); font-size: .92rem; margin-top: 4px; }
    .card {
      background: var(--card);
      border: 1px solid rgba(208,213,221,.7);
      border-radius: 18px;
      padding: 14px;
      box-shadow: var(--shadow);
      margin: 12px 0;
    }
    label { display: block; font-weight: 650; margin: 13px 0 6px; }
    input, textarea {
      width: 100%;
      font: inherit;
      font-size: 16px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      outline: none;
    }
    input:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(11,103,255,.12);
    }
    textarea { min-height: 70px; resize: vertical; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .actions { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 14px; }
    button, .download-link {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 13px 14px;
      font: inherit;
      font-weight: 750;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: inline-block;
    }
    .primary { background: var(--primary); color: #fff; }
    .secondary { background: #eef4ff; color: #064bb5; }
    .light { background: #f2f4f7; color: #344054; }
    .danger { background: #fff1f1; color: var(--danger); }
    .ok { color: var(--ok); font-weight: 700; margin-top: 8px; display:none; }
    .teams-header { display:flex; justify-content:space-between; align-items:center; gap:10px; }
    .count { color: var(--muted); font-size: .9rem; white-space: nowrap; }
    .team {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      margin-top: 10px;
      background: #fff;
    }
    .team-title { font-weight: 800; margin-bottom: 4px; }
    .team-meta { color: var(--muted); font-size: .9rem; line-height: 1.35; }
    .team-buttons { display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:10px; }
    .small { padding: 9px 10px; border-radius: 10px; font-size: .92rem; }
    .hint { color: var(--muted); font-size: .86rem; margin-top: 8px; line-height: 1.35; }
    @media (min-width: 650px) {
      body { max-width: 700px; margin: 0 auto; }
      .actions { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Robot Team Interview Tracker</h1>
    <div class="sub">Fast team notes, saved on this phone, exportable as a report.</div>
  </header>

  <main>
    <section class="card">
      <form id="teamForm">
        <input type="hidden" id="editIndex" value="" />

        <div class="row">
          <div>
            <label for="teamNumber">Team Number</label>
            <input id="teamNumber" name="teamNumber" autocomplete="off" autocapitalize="characters" placeholder="1234A" required />
          </div>
          <div>
            <label for="motorCount">Motor Count</label>
            <input id="motorCount" name="motorCount" inputmode="numeric" autocomplete="off" placeholder="6" />
          </div>
        </div>

        <label for="aiModel">AI Model</label>
        <input id="aiModel" name="aiModel" autocomplete="off" placeholder="Example: YOLO, MobileNet, custom model" />

        <label for="aiProcessor">AI Processor</label>
        <input id="aiProcessor" name="aiProcessor" autocomplete="off" placeholder="Example: Limelight, Raspberry Pi, Jetson" />

        <label for="sensors">Sensors</label>
        <textarea id="sensors" name="sensors" placeholder="Camera, gyro, encoders, distance sensors, etc."></textarea>

        <label for="lidar">Using a LIDAR?</label>
        <input id="lidar" name="lidar" autocomplete="off" placeholder="Yes / No / Details" />

        <label for="codingEnvironment">Coding Environment</label>
        <input id="codingEnvironment" name="codingEnvironment" autocomplete="off" placeholder="Example: Python, Java, C++, WPILib, FTC SDK" />

        <label for="approachable">What would make the game more approachable?</label>
        <textarea id="approachable" name="approachable" placeholder="Team feedback..."></textarea>

        <div class="actions">
          <button type="submit" class="primary" id="saveBtn">Save Team</button>
          <button type="button" class="light" id="clearFormBtn">Clear Form</button>
        </div>
        <div class="ok" id="savedMsg">Saved.</div>
      </form>
    </section>

    <section class="card">
      <div class="teams-header">
        <h2 style="margin:0;font-size:1.1rem;">Teams</h2>
        <div class="count" id="teamCount">0 saved</div>
      </div>
      <div id="teamList"></div>
    </section>

    <section class="card">
      <h2 style="margin-top:0;font-size:1.1rem;">Report</h2>
      <div class="actions">
        <button type="button" class="secondary" id="copyReportBtn">Copy Report</button>
        <button type="button" class="secondary" id="downloadReportBtn">Download Report</button>
        <button type="button" class="secondary" id="downloadCsvBtn">Download CSV</button>
        <button type="button" class="danger" id="clearAllBtn">Delete All Saved Teams</button>
      </div>
      <div class="hint">On iPhone, downloaded files usually appear in Files or Downloads. Everything is stored only in this browser using local storage.</div>
    </section>
  </main>

<script>
(function () {
  const storageKey = "robotTeamInterviewData.v1";
  const fields = ["teamNumber", "aiModel", "aiProcessor", "motorCount", "sensors", "lidar", "codingEnvironment", "approachable"];

  const labels = {
    teamNumber: "Team Number",
    aiModel: "AI Model",
    aiProcessor: "AI Processor",
    motorCount: "Motor Count",
    sensors: "Sensors",
    lidar: "Using a LIDAR",
    codingEnvironment: "Coding Environment",
    approachable: "What would make the game more approachable?"
  };

  const form = document.getElementById("teamForm");
  const teamList = document.getElementById("teamList");
  const teamCount = document.getElementById("teamCount");
  const savedMsg = document.getElementById("savedMsg");
  const saveBtn = document.getElementById("saveBtn");

  function loadTeams() {
    try { return JSON.parse(localStorage.getItem(storageKey)) || []; }
    catch { return []; }
  }

  function saveTeams(teams) {
    localStorage.setItem(storageKey, JSON.stringify(teams));
  }

  function getFormData() {
    const data = {};
    fields.forEach(id => data[id] = document.getElementById(id).value.trim());
    data.updatedAt = new Date().toISOString();
    return data;
  }

  function setFormData(data, index) {
    fields.forEach(id => document.getElementById(id).value = data[id] || "");
    document.getElementById("editIndex").value = index ?? "";
    saveBtn.textContent = index === "" || index === undefined ? "Save Team" : "Update Team";
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function clearForm() {
    form.reset();
    document.getElementById("editIndex").value = "";
    saveBtn.textContent = "Save Team";
  }

  function showSaved(text) {
    savedMsg.textContent = text;
    savedMsg.style.display = "block";
    setTimeout(() => savedMsg.style.display = "none", 1300);
  }

  function escapeHtml(text) {
    return String(text || "").replace(/[&<>'"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#039;","\"":"&quot;"}[c]));
  }

  function renderTeams() {
    const teams = loadTeams();
    teamCount.textContent = teams.length + (teams.length === 1 ? " saved" : " saved");
    teamList.innerHTML = "";

    if (teams.length === 0) {
      teamList.innerHTML = '<p class="hint">No teams saved yet.</p>';
      return;
    }

    teams.forEach((team, index) => {
      const div = document.createElement("div");
      div.className = "team";
      div.innerHTML = `
        <div class="team-title">Team ${escapeHtml(team.teamNumber || "Unknown")}</div>
        <div class="team-meta">
          AI: ${escapeHtml(team.aiModel || "-")}<br>
          Processor: ${escapeHtml(team.aiProcessor || "-")}<br>
          Motors: ${escapeHtml(team.motorCount || "-")} | LIDAR: ${escapeHtml(team.lidar || "-")}
        </div>
        <div class="team-buttons">
          <button type="button" class="small light" data-action="edit" data-index="${index}">Edit</button>
          <button type="button" class="small danger" data-action="delete" data-index="${index}">Delete</button>
        </div>`;
      teamList.appendChild(div);
    });
  }

  function buildReport() {
    const teams = loadTeams();
    const date = new Date().toLocaleString();
    let report = `Robot Team Interview Report\nGenerated: ${date}\nTeams interviewed: ${teams.length}\n\n`;

    teams.forEach((team, i) => {
      report += `Team ${i + 1}: ${team.teamNumber || "Unknown"}\n`;
      fields.forEach(id => report += `${labels[id]}: ${team[id] || ""}\n`);
      report += "\n";
    });

    report += "Summary\n";
    report += `- Total teams: ${teams.length}\n`;
    report += `- Teams using LIDAR or mentioning LIDAR: ${teams.filter(t => /yes|lidar/i.test(t.lidar || "")).length}\n`;
    report += "\nApproachability Feedback\n";
    teams.forEach(team => {
      if (team.approachable) report += `- Team ${team.teamNumber || "Unknown"}: ${team.approachable}\n`;
    });
    return report;
  }

  function buildCsv() {
    const teams = loadTeams();
    const header = fields.map(id => labels[id]);
    const rows = teams.map(team => fields.map(id => team[id] || ""));
    return [header, ...rows].map(row => row.map(value => '"' + String(value).replace(/"/g, '""') + '"').join(",")).join("\n");
  }

  function downloadFile(filename, text, type) {
    const blob = new Blob([text], { type });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
  }

  form.addEventListener("submit", function (event) {
    event.preventDefault();
    const teams = loadTeams();
    const data = getFormData();
    const editIndex = document.getElementById("editIndex").value;

    if (editIndex !== "") teams[Number(editIndex)] = data;
    else teams.push(data);

    saveTeams(teams);
    clearForm();
    renderTeams();
    showSaved(editIndex !== "" ? "Team updated." : "Team saved.");
    document.getElementById("teamNumber").focus();
  });

  document.getElementById("clearFormBtn").addEventListener("click", clearForm);

  teamList.addEventListener("click", function (event) {
    const btn = event.target.closest("button");
    if (!btn) return;
    const index = Number(btn.dataset.index);
    const teams = loadTeams();
    if (btn.dataset.action === "edit") setFormData(teams[index], index);
    if (btn.dataset.action === "delete") {
      if (confirm("Delete this team entry?")) {
        teams.splice(index, 1);
        saveTeams(teams);
        renderTeams();
      }
    }
  });

  document.getElementById("copyReportBtn").addEventListener("click", async function () {
    const report = buildReport();
    try {
      await navigator.clipboard.writeText(report);
      alert("Report copied to clipboard.");
    } catch {
      prompt("Copy this report:", report);
    }
  });

  document.getElementById("downloadReportBtn").addEventListener("click", function () {
    downloadFile("robot-team-interview-report.txt", buildReport(), "text/plain");
  });

  document.getElementById("downloadCsvBtn").addEventListener("click", function () {
    downloadFile("robot-team-interview-data.csv", buildCsv(), "text/csv");
  });

  document.getElementById("clearAllBtn").addEventListener("click", function () {
    if (confirm("Delete all saved team data from this browser?")) {
      saveTeams([]);
      clearForm();
      renderTeams();
    }
  });

  renderTeams();
})();
</script>
</body>
</html>
